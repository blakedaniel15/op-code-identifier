   NORMALIZATION + TOKENIZATION
   ============================================================ */

// Stopwords — common action verbs, fillers, and words that add no category signal.
// IMPORTANT: 'package' and 'maintenance' are NOT stopwords — they're Service Package signals.
const STOPWORDS = new Set([
  'a','an','the','and','or','of','to','in','on','for','per','with','without','at','by','from','up','as','is','are','was','were','be','been','being',
  'perform','performed','performing','complete','completed','completing','completely',
  'replace','replaced','replacing','install','installed','installing','new','done','all',
  'this','that','these','those','change','changed','changes','changing',
  'customer','vehicle','repair','work','order','dealer','dealership','car','truck',
  'states','state','also','full','every','each','only','will','need','needs',
  'our','their','your','my','if','when','because','due','so','then','just','very','much',
  'service','services','serviced','servicing',
  'bg','moc','products','product','freestyle','synthetic',
  'nc','cp','special','special',
]);

// Content tokens that should get a category-boost weight when matching
const CONTENT_BOOST = new Set([
  'brake','fluid','flush','exchange','coolant','antifreeze','cabin','engine','air','filter',
  'microfilter','transmission','atf','cvt','trans','transfer','case','differential','diff',
  'rear','front','axle','alignment','wheel','four','power','steering','psf','fuel',
  'induction','injection','injector','gdi','scheduled','maintenance','minder','factory',
  'mile','miles','package','packages','intake',
  'awd','4x4','4wd','driveline',
  'tire','tires','mount','mounted','mounting','dismount','installation',
  'ac','evaporator','refrigerant','refresh','recharge','frigifresh','freon','hvac',
]);

// Synonym normalization — collapse variant spellings to a canonical token before matching.
// This handles cases like "injector" vs "injection" (both → "injector") and common typos.
const TOKEN_SYNONYMS = {
  'injection': 'injector',
  'injections': 'injector',
  'injectors': 'injector',
  'inject': 'injector',
  'tranmission': 'transmission',
  'tranny': 'transmission',
  'transmisssion': 'transmission',
  'diffrential': 'differential',
  'differentials': 'differential',
  'differenial': 'differential',
  'difference': 'differential',
  'filters': 'filter',
  'flushed': 'flush',
  'flushing': 'flush',
  'alignments': 'alignment',
  'align': 'alignment',
  'coolants': 'coolant',
  'antifreeze': 'coolant',
  'intervals': 'interval',
  'intvl': 'interval',
  'scheduled': 'scheduled',
  'schedule': 'scheduled',
  'maint': 'maintenance',
  'tcase': 'transfer',
  'xfer': 'transfer',
  'xfercase': 'transfer',
};

function normalizeForComparison(desc) {
  if (!desc) return '';
  let d = String(desc).toLowerCase();
  // Pre-expand brand terms and acronyms BEFORE stripping punctuation, otherwise
  // "a/c" becomes "a c" and both get filtered out as too short.
  d = d.replace(/\ba\s*\/\s*c\b/g, 'ac');              // "A/C" or "A / C" → "ac"
  d = d.replace(/\bair[\s\-]+conditioning\b/g, 'ac');   // "air conditioning" / "air-conditioning" → "ac"
  d = d.replace(/\bfrigi[\s\-]*fresh\b/g, 'frigifresh'); // "frigi-fresh" / "frigi fresh" → "frigifresh"
  // Collapse two-word forms to the single-token form the KB uses
  d = d.replace(/\bmicro[\s\-]+filter/g, 'microfilter'); // "micro filter" / "micro-filter" → "microfilter"
  d = d.replace(/\bmicro[\s\-]+filters/g, 'microfilter');
  return d
    .replace(/\$[\d,.]+/g, ' ')            // strip dollar amounts like "$69.95"
    .replace(/\d+\s*(?:\/\s*\d+)?/g, ' ')  // strip numbers (incl. "3/31" etc)
    .replace(/[^a-z\s]/g, ' ')             // strip punctuation / non-alpha
    .replace(/\s+/g, ' ')
    .trim();
}

function tokenize(desc) {
  const norm = normalizeForComparison(desc);
  return norm.split(' ')
    .filter(t => t && t.length >= 2 && !STOPWORDS.has(t))
    .map(t => TOKEN_SYNONYMS[t] || t);
}

function tokenSet(desc) {
  return new Set(tokenize(desc));
}

/* ============================================================
   DESCRIPTION SIMILARITY (KB token coverage, boosted for content tokens)
   ============================================================ */

// Weighted coverage: what fraction of KB entry's content tokens appear in input.
// Weight content tokens 2x so "brake fluid flush" can't be matched by coincidence.
function weighted(tokens) {
  let w = 0;
  for (const t of tokens) w += (CONTENT_BOOST.has(t) ? 2 : 1);
  return w;
}

// Contiguous-phrase detection: does the KB description's content tokens appear as
// a tight phrase inside the input? This catches long marketing-copy descriptions
// where the actual service language ("brake fluid exchange") is buried in filler.
function phrasePresence(inputTokens, kbTokens) {
  // kbTokens is an ordered array here, not a set
  const contentKb = kbTokens.filter(t => CONTENT_BOOST.has(t));
  if (contentKb.length < 2) return 0;
  // Look for the KB content phrase within the input as a subsequence within a small window
  const joined = inputTokens.join(' ');
  const phrase = contentKb.join(' ');
  if (joined.includes(phrase)) return 1.0;
  // Partial: check for 2+ consecutive KB content tokens in the input
  let bestRun = 0;
  for (let i = 0; i < inputTokens.length; i++) {
    let run = 0;
    let kbIdx = 0;
    for (let j = i; j < inputTokens.length && kbIdx < contentKb.length; j++) {
      if (inputTokens[j] === contentKb[kbIdx]) { run++; kbIdx++; }
      else if (CONTENT_BOOST.has(inputTokens[j])) break; // non-matching content token breaks
    }
    if (run > bestRun) bestRun = run;
  }
  return bestRun >= 2 ? (bestRun / contentKb.length) * 0.8 : 0;
}

function descSimilarity(inputText, kbText) {
  const inputTokenArr = tokenize(inputText);
  const kbTokenArr = tokenize(kbText);
  const inputTokens = new Set(inputTokenArr);
  const kbTokens = new Set(kbTokenArr);
  if (kbTokens.size === 0 || inputTokens.size === 0) return 0;

  let matchWeight = 0, kbWeight = 0;
  for (const t of kbTokens) {
    const w = CONTENT_BOOST.has(t) ? 2 : 1;
    kbWeight += w;
    if (inputTokens.has(t)) matchWeight += w;
  }
  // coverage: KB concepts present in input
  const coverage = matchWeight / kbWeight;

  // input-coverage: don't let a 20-word input match a 2-word KB trivially
  let inputMatchWeight = 0, inputTotalWeight = 0;
  for (const t of inputTokens) {
    const w = CONTENT_BOOST.has(t) ? 2 : 1;
    inputTotalWeight += w;
    if (kbTokens.has(t)) inputMatchWeight += w;
  }
  const inputCoverage = inputTotalWeight > 0 ? inputMatchWeight / inputTotalWeight : 0;

  // Phrase presence: rewards KB terms appearing as a contiguous phrase in input.
  // This is what catches "DURING INSPECTION FOUND BRAKE FLUID TO BE CONTAIMINATED
  // RECOMMEND A BRAKE FLUID EXCHANGE" — the KB phrase "brake fluid exchange" IS in there.
  const phraseScore = phrasePresence(inputTokenArr, kbTokenArr);

  // Blend: coverage dominates, input-coverage disambiguates, phrase-presence rescues marketing copy
  const base = 0.70 * coverage + 0.15 * inputCoverage + 0.15 * phraseScore;

  // Floor: if the full KB phrase is present in the input, the match is at LEAST strong
  // regardless of the input's length. Marketing copy rescue.
  if (phraseScore >= 0.95) return Math.max(base, 0.75);
  return base;
}

// Best similarity between an op code's dominant repeated description and a KB entry.
// CRITICAL: we match only against the most-repeated normalized description cluster,
// not the top-N raw descriptions. A 79-row "CONFIRM FRAME VIN" op code with 2 minority rows
// of "engine and cabin filters" should not classify as a filter service just because the
// minority rows match the KB.
function bestDescSim(descCounts, kbText) {
  const normCounts = new Map();
  for (const [d, c] of Object.entries(descCounts)) {
    const n = normalizeForComparison(d);
    if (!n) continue;
    if (!normCounts.has(n)) normCounts.set(n, { raw: d, count: 0 });
    normCounts.get(n).count += c;
  }
  if (normCounts.size === 0) return 0;
  const sorted = [...normCounts.entries()].sort((a, b) => b[1].count - a[1].count);
  // Use the dominant cluster's representative description
  return descSimilarity(sorted[0][1].raw, kbText);
}

/* ============================================================
   OP CODE SIMILARITY (supporting signal only)
   ============================================================ */

function trigrams(s) {
  const padded = '  ' + String(s).toUpperCase() + '  ';
  const set = new Set();
  for (let i = 0; i < padded.length - 2; i++) set.add(padded.slice(i, i + 3));
  return set;
}

function opSimilarity(codeA, codeB) {
  const a = String(codeA).toUpperCase();
  const b = String(codeB).toUpperCase();
  if (!a || !b) return 0;
  if (a === b) return 1;
  // Substring bonus (catches 02MOCBFF containing BFF)
  const longer = a.length >= b.length ? a : b;
  const shorter = a.length >= b.length ? b : a;
  let substrBonus = 0;
  if (shorter.length >= 3 && longer.includes(shorter)) {
    substrBonus = shorter.length / Math.max(longer.length, 6);
  }
  // Trigram Jaccard
  const ta = trigrams(a), tb = trigrams(b);
  let inter = 0;
  for (const t of ta) if (tb.has(t)) inter++;
  const union = ta.size + tb.size - inter;
  const jac = union > 0 ? inter / union : 0;
  return Math.min(1, Math.max(jac, substrBonus * 0.9));
}

/* ============================================================
   REPETITION SCORE — the new primary signal
   ============================================================ */

function repetitionScore(descCounts, rowCount) {
  if (rowCount === 0) return { score: 0, topNormalized: null, topCount: 0 };
  // Group by normalized description — "REPLACE CABIN AIR FILTER = $69.95" and
  // "REPLACE CABIN AIR FILTER = $55.00" collapse to the same normalized key.
  const normalized = new Map();
  for (const [desc, count] of Object.entries(descCounts)) {
    const n = normalizeForComparison(desc);
    if (!n) continue;
    normalized.set(n, (normalized.get(n) || 0) + count);
  }
  if (normalized.size === 0) return { score: 0, topNormalized: null, topCount: 0 };
  let topKey = null, topCount = 0;
  for (const [k, c] of normalized.entries()) if (c > topCount) { topCount = c; topKey = k; }
  // Sum the top 2 normalized variants (minor wording shifts count as same service)
  const sorted = [...normalized.values()].sort((a, b) => b - a);
  const topTwo = (sorted[0] || 0) + (sorted[1] || 0);
  return {
    score: topTwo / rowCount,
    topNormalized: topKey,
    topCount,
    uniqueNormalized: normalized.size,
  };
}

// Service Package indicators — descriptions containing these are bundles, not individual services.

const PACKAGE_INDICATORS = [
  /scheduled\s+maintenance/,
  /factory\s+scheduled/,

function isPackageDescription(descCounts) {
  // Check the DOMINANT description only — not any description. A code where the
  // majority of rows are "OIL CHANGE" and one minority row mentions "scheduled" is
  // not a package code.
  const desc = dominantDescription(descCounts);
  if (PACKAGE_INDICATORS.some(p => p.test(desc))) return true;
  // Also treat as package: bundled engine AND cabin filter in same description
  // (these are package inserts, not individual filter replacements)
  const hasEngine = /engine\s+(?:air\s+)?filter/.test(desc) || /engine\s+and\s+cabin/.test(desc);
  const hasCabin = /cabin\s+(?:air\s+)?filter/.test(desc) || /engine\s+and\s+cabin/.test(desc);
  if (hasEngine && hasCabin) return true;
  return false;
}

function checkExclusion(opCode, descCounts, rowCount) {
  // Package bypass FIRST — if the dominant description is a scheduled maintenance
  // package, never exclude on op code pattern. Codes like 0600743 (GM 1st scheduled
  // maintenance) would otherwise be wrongly killed by the 7+ digit campaign-code rule.
  if (isPackageDescription(descCounts)) {
    return { excluded: false };
  }
  // Op code hard-exclusions (minimal list — only unambiguous non-service patterns)
  if (OP_EXCLUSION_PATTERNS.some(p => p.test(opCode))) {
    return { excluded: true, reason: 'Op code matches non-service pattern (recall, campaign, rental, detail, wash)' };
  }
  // Description-based: if majority of rows match exclusion patterns
  let excludedRows = 0, total = 0;
  for (const [desc, count] of Object.entries(descCounts)) {
    const d = desc.toLowerCase();
    if (DESC_EXCLUSION_PATTERNS.some(p => p.test(d))) excludedRows += count;
    total += count;
  }
  if (total > 0 && excludedRows / total >= 0.5) {
    const pct = Math.round(excludedRows / total * 100);
    return { excluded: true, reason: `${pct}% of rows describe excluded work (oil change, MPI, rotation, wiper, battery, fuel filter, recall, wash, etc.)` };
  }
  return { excluded: false };
}

/* ============================================================
   DISAMBIGUATION RULES (applied after KB matching)
   ============================================================ */

function dominantDescription(descCounts) {
  // Return the single most frequent raw description, lowercased — not a concatenation.
  // Disambiguation rules should only fire when the *repeated* description shows the pattern,
  // not when some minority row happens to contain a stray word.
  let topDesc = '', topCount = 0;
  for (const [d, c] of Object.entries(descCounts)) {
    if (c > topCount) { topCount = c; topDesc = d; }
  }
  return topDesc.toLowerCase();
}

/* ============================================================
   TIRE OPERATION DETECTION
   Tire count (1/2/3/4) can't come from KB similarity because numbers
   get stripped in normalization. It has to come from the raw description.
   A "tire operation" is mount / R&R / replacement — NOT balance-only.
   ============================================================ */

function isTireOperation(desc) {
  const d = desc.toLowerCase();
  // Must reference tire(s)
  if (!/\btires?\b/.test(d)) return false;

  // REJECT tire-accessory and tire-adjacent work — these mention "tire" but are not
  // tire mount/R&R operations. Guarding here keeps the tire path from hijacking:
  //   - TPMS / tire pressure sensor work
  //   - Valve stem or stud replacement
  //   - Spare tire handling
  //   - Tire repair / patch / plug / flat
  //   - Rotation or balance-only work
  if (/\btpms\b|tire\s+pressure\s+(?:monitor|sensor)/.test(d)) return false;
  if (/valve\s+stem|wheel\s+stem|tire\s+stem/.test(d)) return false;
  if (/\bspare\s+tire\b/.test(d)) return false;
  if (/tire\s+(?:repair|patch|plug|flat|leak)/.test(d)) return false;
  if (/flat\s+repair|plug\s+(?:a\s+)?tire/.test(d)) return false;
  if (/\bonly\s+(?:balance|rotate|rotation)/.test(d)) return false;

  // Must involve a billable tire verb (mount, dismount, R&R, replace, install)
  const hasMount = /\bmount\b|\bmounting\b|\bdismount\b/.test(d);
  const hasRR = /\br\s*[&/]\s*r\b/.test(d) || /\brr\b/.test(d) || /remove[^a-z]{0,20}replace/.test(d);
  const hasReplace = /\breplace\b|\binstall\b|\bnew\s+tires?\b/.test(d);
  if (!hasMount && !hasRR && !hasReplace) return false;

  return true;
}

function detectTireCount(desc) {
  const d = desc.toLowerCase();
  // Numeric: "mount and balance 4 tires", "R&R 2 tires", "tire(s) 4"
  let m = d.match(/(\d+)\s*\b(?:tires?|wheels?)\b/);
  if (m) {
    const n = parseInt(m[1], 10);
    if (n >= 1 && n <= 4) return n;
  }
  // After tire keyword: "tires (4)", "tire x4", "tires - 4"
  m = d.match(/\btires?\b[^a-z0-9]{0,5}(\d)/);
  if (m) {
    const n = parseInt(m[1], 10);
    if (n >= 1 && n <= 4) return n;
  }
  // Word form: "one tire", "four tires"
  const words = { one: 1, two: 2, three: 3, four: 4, single: 1 };
  for (const [w, n] of Object.entries(words)) {
    if (new RegExp(`\\b${w}\\s+tires?\\b`).test(d)) return n;
  }
  // "all four" or "set of four"
  if (/\b(?:all|set\s+of)\s+four\b/.test(d)) return 4;
  // Fallback: trailing isolated single digit 1-4 at end of string (e.g. "TIRE MOUNT - 2")
  m = d.match(/[\s\-]([1-4])\s*$/);
  if (m) return parseInt(m[1], 10);
  return null;
}

function applyDisambiguation(opCode, descCounts, topMatch, candidates) {
  if (!topMatch) return { category: null, note: null };
  const desc = dominantDescription(descCounts); // only the dominant description
  let category = topMatch.category;
  let note = null;

  // Rule 0: Service Package indicators WIN regardless of what the KB top match says.
  // Only fires if the dominant description is a package bundle.
  if (PACKAGE_INDICATORS.some(p => p.test(desc))) {
    category = 'Service Packages';
    note = 'Description contains service package language (scheduled maintenance / mile service / package).';
    return { category, note };
  }

  // Rule 1: Tire operations — mount/R&R/install with a tire count (1-4).
  // Fires BEFORE KB category takes effect, because numbers are stripped in normalization
  // so the KB similarity can't distinguish 1-tire vs 4-tire operations.
  if (isTireOperation(desc)) {
    const n = detectTireCount(desc);
    if (n !== null) {
      category = `${n} Tire`;
      note = `Tire mount / R&R operation (${n} tire${n > 1 ? 's' : ''}).`;
    } else {
      category = '1 Tire';
      note = 'Tire mount / R&R operation — count unclear in description, defaulted to 1 Tire.';
    }
    return { category, note };
  }

  // Guard: if KB top suggests a Tire category but the dominant description isn't actually
  // a tire mount/R&R operation (e.g. it's a pure balance), fall back to the next non-tire
  // candidate. This prevents balance-only descriptions from landing in tire categories
  // due to shared "tire" / "balance" tokens.
  if (/^\d Tire$/.test(category)) {
    const alt = candidates.find(c => !/^\d Tire$/.test(c.category));
    if (alt) {
      category = alt.category;
      note = 'Tire category suggested by KB but description is not a mount/R&R operation; routed to next candidate.';
    } else {
      category = null;
      note = 'KB matched a Tire category but description lacks mount/R&R verbs; left unclassified.';
    }
  }

  // Rule 2: "front or rear differential" → default to Rear Differential (Blake's call)
  if (/front\s+(?:or|and|\/)\s+rear\s+differential/.test(desc)
      || /rear\s+(?:or|and|\/)\s+front\s+differential/.test(desc)) {
    category = 'Rear Differential';
    note = 'Unified front/rear differential code — defaulted to Rear Differential.';
    return { category, note };
  }

  // Rule 3: bundled filter descriptions → Service Package
  // Must match within the SAME dominant description (engine filter AND cabin filter together).
  const hasEngine = /engine\s+(?:air\s+)?filter/.test(desc) || /engine\s+and\s+cabin/.test(desc);
  const hasCabin = /cabin\s+(?:air\s+)?filter/.test(desc) || /engine\s+and\s+cabin/.test(desc);
  if (hasEngine && hasCabin) {
    category = 'Service Packages';
    note = 'Bundled engine + cabin filter — classified as Service Package.';
    return { category, note };
  }

  // Rule 4: Injector/induction disambiguation — force Fuel Induction when dominant desc
  // clearly mentions injector/injection/induction in a fuel-flush context.
  const hasInjector = /injector|injection|induction/.test(desc);
  if (hasInjector && (desc.includes('fuel') || /\b(?:gdi|port)\b/.test(desc) || desc.includes('flush'))) {
    const fuelCand = candidates.find(c => c.category === 'Fuel Induction/Injector Service');
    if (fuelCand) {
      category = 'Fuel Induction/Injector Service';
      note = null;
    }
  }

  // Rule 5: front/rear differential specificity
  if (desc.includes('front differential') && !desc.includes('rear differential')) {
    if (candidates.find(c => c.category === 'Front Differential')) category = 'Front Differential';
  }
  if (desc.includes('rear differential') && !desc.includes('front differential')) {
    if (candidates.find(c => c.category === 'Rear Differential')) category = 'Rear Differential';
  }

  return { category, note };
}

/* ============================================================
   KB MATCHING — core classification
   ============================================================ */

function matchAgainstKB(aggregated, kb) {
  const { opCode, descCounts } = aggregated;
  // Score every KB entry
  const scored = kb.map(entry => {
    const descSim = bestDescSim(descCounts, entry.description);
    const opSim = opSimilarity(opCode, entry.opCode);
    // Blake's rule: description dominates, op code is supporting
    const combined = 0.80 * descSim + 0.20 * opSim;
    return { ...entry, descSim, opSim, combined };
  }).filter(m => m.combined > 0.10).sort((a, b) => b.combined - a.combined);

  // Vote on category using top-k weighted by combined score
  const K = 8;
  const topK = scored.slice(0, K);
  const votes = {};
  for (const m of topK) {
    votes[m.category] = (votes[m.category] || 0) + m.combined;
  }
  const ranked = Object.entries(votes).map(([cat, score]) => ({ category: cat, score })).sort((a, b) => b.score - a.score);

  return {
    topMatches: scored.slice(0, 5),
    candidates: ranked,
    topScore: scored[0]?.combined || 0,
    top: scored[0] || null,
  };
}

/* ============================================================
   STATS
   ============================================================ */

function computeStats(values) {
  const clean = values.filter(v => v != null && !isNaN(v) && v > 0).map(Number);
  if (clean.length === 0) return null;
  const n = clean.length;
  const mean = clean.reduce((a, b) => a + b, 0) / n;
  const sorted = [...clean].sort((a, b) => a - b);
  const median = n % 2 ? sorted[Math.floor(n/2)] : (sorted[n/2-1] + sorted[n/2]) / 2;
  const variance = clean.reduce((acc, v) => acc + (v - mean) ** 2, 0) / n;
  const stddev = Math.sqrt(variance);
  const cv = mean > 0 ? stddev / mean : null;
  return { n, mean, median, stddev, cv };
}

/* ============================================================
   MAIN CLASSIFICATION
   ============================================================ */

function classifyOpCode(agg, kb) {
  const { opCode, descCounts, rowCount, laborValues, hoursValues } = agg;

  // 1. Exclusion pass
  const excl = checkExclusion(opCode, descCounts, rowCount);
  if (excl.excluded) {
    return {
      ...agg,
      category: null,
      confidence: 'EXCLUDED',
      decision: 'EXCLUDE',
      reason: excl.reason,
      repetition: 0,
      matchScore: 0,
      topMatches: [],
      note: null,
    };
  }

  // 2. Repetition signal
  const rep = repetitionScore(descCounts, rowCount);

  // 3. Stats
  const laborStats = computeStats(laborValues);
  const hoursStats = computeStats(hoursValues);

  // 4. KB match
  const kbMatch = matchAgainstKB(agg, kb);
  const { topMatches, candidates, topScore, top } = kbMatch;

  if (!top) {
    return {
      ...agg,
      category: null,
      confidence: 'NONE',
      decision: 'REVIEW',
      reason: `No similar service descriptions in the knowledge base. Top description: "${rep.topNormalized || '—'}".`,
      repetition: rep.score,
      matchScore: 0,
      topMatches: [],
      laborStats,
      hoursStats,
      note: null,
    };
  }

  // 5. Disambiguation overrides
  const disambig = applyDisambiguation(opCode, descCounts, top, candidates);
  let finalCategory = disambig.category;

  // If disambiguation moved category, find the best match for the overridden category
  let topForFinalCat = top;
  if (finalCategory !== top.category) {
    topForFinalCat = topMatches.find(m => m.category === finalCategory) || top;
  }

  // 6. Conflict detection — do runner-up candidates have similar score?
  const conflict = candidates.length >= 2 && candidates[1].score > candidates[0].score * 0.8
                   && candidates[0].category !== candidates[1].category;

  // 7. Decision logic — description-first, repetition-gated
  let decision = 'REVIEW';
  let confidence = 'LOW';
  let reason = '';

  const veryStrongDesc = topScore >= 0.80;
  const strongDesc = topScore >= 0.65;
  const modDesc = topScore >= 0.40;
  const cleanRep = rep.score >= 0.85;
  const okRep = rep.score >= 0.60;
  const fairRep = rep.score >= 0.45;
  const scatteredRep = rep.score < 0.40;

  // Tire ops have naturally scattered descriptions (size, position, brand vary each row)
  // but the op code is still a defined service. If tire op + count was detected and volume
  // is reasonable, don't let scatter kick it to review.
  const isConfirmedTireOp = /^\d Tire$/.test(finalCategory) && disambig.note && /\d tire/.test(disambig.note);

  if (scatteredRep && !isConfirmedTireOp) {
    decision = 'REVIEW';
    confidence = 'LOW';
    reason = `Scattered descriptions (${Math.round(rep.score*100)}% top repetition across ${rep.uniqueNormalized} variants) — looks like a diagnostic or complaint code, not a defined service. ${rowCount >= 10 ? 'High volume makes this unlikely to be a service.' : ''}`;
  } else if (rowCount < 2) {
    decision = 'REVIEW';
    confidence = 'LOW';
    reason = `Only ${rowCount} row — too little evidence to auto-classify. Confirm manually.`;
  } else if (rowCount < 5) {
    // Low volume, but if match is strong AND rep is perfect, still auto-classify MEDIUM.
    // Also auto-classify when match is very strong (80%+) even if rep isn't perfect —
    // a 90% description match on 3 rows is compelling enough to trust.
    if ((strongDesc && cleanRep) || veryStrongDesc) {
      decision = 'AUTO';
      confidence = 'MEDIUM';
      reason = `Low volume (${rowCount} rows) but ${veryStrongDesc ? 'very strong' : 'clean repeated'} description match for ${finalCategory} (${Math.round(topScore*100)}% similarity).`;
    } else {
      decision = 'REVIEW';
      confidence = strongDesc ? 'MEDIUM' : 'LOW';
      reason = `Too few rows (${rowCount}) to auto-classify${strongDesc ? `. Description strongly matches ${finalCategory}.` : '.'} Confirm manually.`;
    }
  } else if (isConfirmedTireOp && rowCount >= 5) {
    // Confirmed tire op (count detected) — trust it even with varied descriptions
    decision = 'AUTO';
    confidence = cleanRep ? 'HIGH' : (okRep ? 'MEDIUM' : 'MEDIUM');
    reason = `Tire operation (${finalCategory}) with ${rowCount} rows. Descriptions vary (tire size/brand/position) but mount/R&R verb and count are consistent.`;
  } else if (strongDesc && cleanRep && !conflict) {
    decision = 'AUTO';
    confidence = 'HIGH';
    reason = `Clean repeated description (${Math.round(rep.score*100)}% of rows) strongly matches ${finalCategory} (${Math.round(topScore*100)}% similarity to "${top.description}"${top.dealer ? ` at ${top.dealer}` : ''}).`;
  } else if (strongDesc && okRep && !conflict) {
    decision = 'AUTO';
    confidence = 'MEDIUM';
    reason = `Description matches ${finalCategory} (${Math.round(topScore*100)}% similarity). Repetition is good (${Math.round(rep.score*100)}%) but not unanimous.`;
  } else if (veryStrongDesc && fairRep && !conflict) {
    // Very strong match — even with only moderate repetition, classify at MEDIUM
    decision = 'AUTO';
    confidence = 'MEDIUM';
    reason = `Strong description match for ${finalCategory} (${Math.round(topScore*100)}% similarity). Repetition only ${Math.round(rep.score*100)}% but match strength is high enough to trust.`;
  } else if (modDesc && cleanRep && !conflict) {
    decision = 'AUTO';
    confidence = 'MEDIUM';
    reason = `Repeated description (${Math.round(rep.score*100)}%) partially matches ${finalCategory} (${Math.round(topScore*100)}% similarity). Review recommended if category matters.`;
  } else if (conflict) {
    decision = 'REVIEW';
    confidence = 'LOW';
    reason = `Description matches multiple categories similarly — top: ${candidates[0].category}, runner-up: ${candidates[1].category}. Human review needed.`;
  } else if (modDesc && okRep) {
    decision = 'REVIEW';
    confidence = 'MEDIUM';
    reason = `Possible ${finalCategory} (${Math.round(topScore*100)}% description similarity, ${Math.round(rep.score*100)}% repetition) — not strong enough to auto-classify.`;
  } else if (topScore < 0.40) {
    decision = 'REVIEW';
    confidence = 'LOW';
    reason = `Weak description match for ${finalCategory} (${Math.round(topScore*100)}% similarity). Manual review needed.`;
  } else {
    decision = 'REVIEW';
    confidence = 'LOW';
    reason = `Partial description match for ${finalCategory} (${Math.round(topScore*100)}% similarity). Manual review needed.`;
  }

  if (disambig.note) reason += ' ' + disambig.note;

  return {
    ...agg,
    category: finalCategory,
    confidence,
    decision,
    reason,
    repetition: rep.score,
    topNormalizedDesc: rep.topNormalized,
    uniqueDescs: rep.uniqueNormalized,
    matchScore: topScore,
    topMatches,
    candidates,
    laborStats,
    hoursStats,
    note: disambig.note,
  };
}

/* ============================================================
   AGGREGATION
   ============================================================ */

function normalizeOpCode(code) { return code == null ? '' : String(code).trim().toUpperCase(); }
function normalizeDesc(desc) { return desc == null ? '' : String(desc).trim().replace(/\s+/g, ' '); }

function aggregateByOpCode(rows, cols) {
  const map = new Map();
  for (const row of rows) {
    const code = normalizeOpCode(row[cols.opCode]);
    if (!code) continue;
    const desc = normalizeDesc(row[cols.description]);
    if (!map.has(code)) {
      map.set(code, {
        opCode: code,
        descCounts: {},
        correctionCounts: {},
        laborValues: [],
        hoursValues: [],
        rowCount: 0,
      });
    }
    const agg = map.get(code);
    agg.rowCount++;
    if (desc) agg.descCounts[desc] = (agg.descCounts[desc] || 0) + 1;
    if (cols.correction && row[cols.correction]) {
      const c = normalizeDesc(row[cols.correction]);
      if (c && c.length >= 5) agg.correctionCounts[c] = (agg.correctionCounts[c] || 0) + 1;
    }
    if (cols.laborSale && row[cols.laborSale] != null) {
      const v = parseFloat(String(row[cols.laborSale]).replace(/[^\d.\-]/g, ''));
      if (!isNaN(v)) agg.laborValues.push(v);
    }
    if (cols.techHours && row[cols.techHours] != null) {
      const v = parseFloat(String(row[cols.techHours]).replace(/[^\d.\-]/g, ''));
      if (!isNaN(v)) agg.hoursValues.push(v);
    }
  }
  return Array.from(map.values()).sort((a, b) => b.rowCount - a.rowCount);
}

/* ============================================================
   COLUMN DETECTION
   ============================================================ */

const COLUMN_ALIASES = {
  opCode: ['op code', 'opcode', 'op_code', 'operation code', 'opcodes', 'op-code', 'operation_code', 'service code'],
  description: ['operations description', 'operation description', 'op description', 'description', 'op desc', 'operations desc', 'service description'],
  correction: ['correction', 'tech correction', 'technician correction', 'corrections'],
  laborSale: ['labor sale', 'labor amount', 'labor total', 'total labor', 'labor $', 'labor_sale', 'labor sales', 'e labor sale', 'customer labor'],
  techHours: ['tech hours', 'technician hours', 'actual hours', 'tech_hours', 'hours', 'labor hours', 'actual tech hours'],
};

function detectColumns(headers) {
  const lowered = headers.map(h => String(h).trim().toLowerCase());
  const detected = {};
  for (const [field, aliases] of Object.entries(COLUMN_ALIASES)) {
    for (const alias of aliases) {
      const idx = lowered.indexOf(alias);
      if (idx >= 0) { detected[field] = headers[idx]; break; }
    }
    if (!detected[field]) {
      const key = aliases[0].split(' ')[0];
      const idx = lowered.findIndex(h => h.includes(key));
      if (idx >= 0) detected[field] = headers[idx];
    }
  }
  return detected;
}

/* ============================================================
   HELPERS
   ============================================================ */

function formatCV(cv) { return cv == null ? '—' : `${(cv * 100).toFixed(0)}%`; }
function cvClass(cv) {
  if (cv == null) return '';
  if (cv < 0.15) return 'cv-good';
  if (cv < 0.35) return 'cv-ok';
  return 'cv-bad';
}
function formatUsd(v) { return v == null ? '—' : '$' + v.toFixed(2); }
function formatHours(v) { return v == null ? '—' : v.toFixed(2) + ' hr'; }
function pct(v) { return Math.round(v * 100) + '%'; }
function barClass(v) { return v >= 0.7 ? 'high' : v >= 0.4 ? 'med' : 'low'; }

function UploadPanel({ onFile }) {
  const [dragging, setDragging] = useState(false);

  return (
    <div

      onClick={() => inputRef.current?.click()}
      onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
      onDragLeave={() => setDragging(false)}

    >
      <h2>Upload dealer data</h2>
      <p>Drop a repair-order-level CSV containing op code, operation description, and (optionally) correction, labor sale, and tech hours.</p>

      <input ref={inputRef} type="file" accept=".csv,.tsv,.txt" style={{ display: 'none' }}

    </div>

}

function ColumnMapper({ headers, detected, onConfirm, onCancel }) {
  const [cols, setCols] = useState(detected);
  const update = (k, v) => setCols(prev => ({ ...prev, [k]: v }));
  const canSubmit = cols.opCode && cols.description;
  return (
    <div className="mapper">
      <h3>Map columns</h3>
      <p className="sub">Description is the primary signal, so make sure Operations Description is mapped. Labor Sale and Tech Hours add confidence.</p>
      {[
        { k: 'opCode', label: 'OP Code', req: true },
        { k: 'description', label: 'Operations Description', req: true },
        { k: 'correction', label: 'Correction', opt: true },
        { k: 'laborSale', label: 'Labor Sale', opt: true },
        { k: 'techHours', label: 'Tech Hours', opt: true },
      ].map(f => (
        <div className="field" key={f.k}>
          <label>
            {f.label}
            {f.req && <span className="req">*</span>}
            {f.opt && <span className="opt">Optional</span>}
          </label>
          <select value={cols[f.k] || ''} onChange={(e) => update(f.k, e.target.value)}>
            <option value="">— not mapped —</option>
            {headers.map(h => <option key={h} value={h}>{h}</option>)}

      ))}
      <div className="actions">

  );
}

/* ============================================================
   EXPORTS
   ============================================================ */

function downloadText(filename, text, type = 'text/csv') {
  // Data URL approach: more compatible with sandboxed iframes than blob URLs.
  // Data URLs are embedded inline so there's no blob-revocation timing issue.
  const dataUrl = `data:${type};charset=utf-8,${encodeURIComponent(text)}`;
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    try { document.body.removeChild(a); } catch (e) {}
  }, 300);
}

function safeFilename(s, suffix) {
  const base = (s || 'dealer').replace(/[^a-z0-9]+/gi, '_').replace(/^_+|_+$/g, '').toLowerCase();
  return `${base}_${suffix}`;
}

function toCsv(headers, rows) {
  const escape = (v) => {
    if (v == null) return '';
    const s = String(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  return [headers.join(','), ...rows.map(r => r.map(escape).join(','))].join('\n');
}

function buildMappingCsv(results) {
  const mapped = results.filter(r => r.decision === 'AUTO' && r.category);
  const headers = ['OP Code', 'EZ Wins Service', 'Confidence', 'Rows', 'Repetition', 'Top Description', 'Avg Labor Sale', 'Avg Tech Hours'];
  const rows = mapped.map(r => {
    const topDesc = Object.entries(r.descCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '';
    return [r.opCode, r.category, r.confidence, r.rowCount, pct(r.repetition || 0), topDesc,
      r.laborStats ? r.laborStats.mean.toFixed(2) : '',
      r.hoursStats ? r.hoursStats.mean.toFixed(2) : ''];
  });
  return toCsv(headers, rows);
}

function buildReviewCsv(results) {
  const review = results.filter(r => r.originalDecision === 'REVIEW');
  const headers = ['OP Code', 'Proposed Category', 'Confidence', 'Rows', 'Repetition', 'Top Description', 'Reason', 'User Mapped', 'Avg Labor Sale', 'Avg Tech Hours'];
  const rows = review.map(r => {
    const topDesc = Object.entries(r.descCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '';
    return [r.opCode, r.category || '', r.confidence, r.rowCount, pct(r.repetition || 0), topDesc, r.reason,
      r.userMapped ? 'yes' : '',
      r.laborStats ? r.laborStats.mean.toFixed(2) : '',
      r.hoursStats ? r.hoursStats.mean.toFixed(2) : ''];
  });
  return toCsv(headers, rows);
}

function buildKbJson(kb) {
  return JSON.stringify(kb, null, 2);
}

function exportMappingCsv(results, dealer) {
  downloadText(safeFilename(dealer, 'opcode_mapping.csv'), buildMappingCsv(results));
}

function exportReviewCsv(results, dealer) {
  downloadText(safeFilename(dealer, 'opcode_review.csv'), buildReviewCsv(results));
}

function exportKb(kb) {
  const date = new Date().toISOString().slice(0, 10);
  downloadText(`ez_wins_opcode_kb_${date}.json`, buildKbJson(kb), 'application/json');
}

// Wrap any export fn so thrown errors surface as a visible toast instead of silently failing.
// Also logs the full error to the console so we can debug further if needed.
function safeExport(fn, label, showToast) {
  try {
    fn();
    showToast(`${label} downloaded`);
  } catch (err) {
    console.error(`[${label}] export failed:`, err);
    showToast(`${label} failed: ${err.message || 'unknown error'}`);
  }
}

/* ============================================================
   PREVIEW MODAL
   Shows export content in a textarea so the user can always copy it
   even if the browser's download mechanism is blocked by the iframe sandbox.
   ============================================================ */

function PreviewModal({ title, filename, content, contentType, onClose, showToast }) {
  const textareaRef = useRef();

  const copyToClipboard = async () => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(content);
        showToast('Copied to clipboard');
      } else {
        // Fallback: select the textarea and use execCommand
        textareaRef.current?.select();
        document.execCommand('copy');
        showToast('Copied to clipboard');
      }
    } catch (err) {
      // Last resort — select text for the user to Ctrl+C manually
      textareaRef.current?.select();
      showToast('Select all + Ctrl+C to copy');
    }
  };

  const tryDownload = () => {
    try {
      downloadText(filename, content, contentType);
      showToast('Download triggered — check your downloads folder');
    } catch (err) {
      showToast('Download failed — use Copy instead');
    }
  };

  const openInNewTab = () => {
    const dataUrl = `data:${contentType};charset=utf-8,${encodeURIComponent(content)}`;
    window.open(dataUrl, '_blank');
  };

  const lineCount = (content.match(/\n/g) || []).length + 1;
  const sizeKb = (new Blob([content]).size / 1024).toFixed(1);

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <h3>{title}</h3>
            <div className="sub" style={{ marginTop: 4 }}>{filename} · {lineCount} lines · {sizeKb} KB</div>
          </div>
          <button className="btn ghost" onClick={onClose}>×</button>
        </div>
        <div className="modal-hint">
          Preview below. Copy to clipboard, download as file, or open in a new tab — whichever works for you.
        </div>
        <div className="modal-body">
          <textarea ref={textareaRef} value={content} readOnly onClick={(e) => e.target.select()} />
        </div>
        <div className="modal-footer">
          <button className="btn" onClick={openInNewTab}>Open in new tab</button>
          <button className="btn" onClick={tryDownload}>Download file</button>
          <button className="btn primary" onClick={copyToClipboard}>Copy to clipboard</button>
        </div>
      </div>
    </div>
  );
}

  doc.line(MARGIN, MARGIN + 16, PAGE_W - MARGIN, MARGIN + 16);

function drawFooter(doc, text3, MARGIN, PAGE_W, PAGE_H) {
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(...text3);
  doc.text('CONFIDENTIAL · FOR DEALER REVIEW', MARGIN, PAGE_H - 36);
  doc.text('ez-wins.com', PAGE_W - MARGIN, PAGE_H - 36, { align: 'right' });
}

function App() {
  const [step, setStep] = useState('upload');
  const [headers, setHeaders] = useState([]);
  const [rows, setRows] = useState([]);
  const [cols, setCols] = useState(null);
  const [detectedCols, setDetectedCols] = useState({});
  const [dealer, setDealer] = useState('');
  const [results, setResults] = useState([]);
  const [tab, setTab] = useState('mapped');
  const [overrides, setOverrides] = useState({});
  const [kb, setKb] = useState(SEED_KB);
  const [error, setError] = useState(null);
  const [toast, setToast] = useState(null);
  const [preview, setPreview] = useState(null); // { title, filename, content, contentType }
  const kbImportRef = useRef();

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const handleFile = (file) => {
    setError(null);
    const base = file.name.replace(/\.[a-z]+$/i, '').replace(/_raw_data_.*$/, '').replace(/[_\-]/g, ' ');
    setDealer(base);
    window.Papa.parse(file, {
      header: true, skipEmptyLines: true, dynamicTyping: false,
      complete: (result) => {
        if (!result.data || !result.data.length) { setError('No data rows found in file.'); return; }
        const hdrs = result.meta.fields || [];
        setHeaders(hdrs); setRows(result.data);
        setDetectedCols(detectColumns(hdrs));
        setStep('map');
      },
      error: (err) => setError('Parse error: ' + err.message),
    });
  };

  const runClassifier = (mappedCols) => {
    setCols(mappedCols);
    const aggregated = aggregateByOpCode(rows, mappedCols);
    const classified = aggregated.map(a => {
      const r = classifyOpCode(a, kb);
      return { ...r, originalDecision: r.decision }; // snapshot original decision for stable buckets
    });
    setResults(classified);
    setStep('results');
  };

  // When user overrides a category, we (a) remember the override and (b) add to KB
  const applyOverride = (opCode, category) => {
    setOverrides(prev => ({ ...prev, [opCode]: category }));
    if (category && category !== '__EXCLUDE__') {
      const result = results.find(r => r.opCode === opCode);
      if (result) {
        const topDesc = Object.entries(result.descCounts).sort((a, b) => b[1] - a[1])[0]?.[0];
        if (topDesc) {
          setKb(prev => [
            ...prev.filter(e => !(e.opCode === opCode && e.dealer === dealer)),
            { opCode, description: topDesc, category, source: 'override', dealer }
          ]);
          showToast(`Added ${opCode} → ${category} to KB`);
          return;
        }
      }
    }
    if (category === '__EXCLUDE__') showToast(`${opCode} marked excluded`);
    else if (category === null) showToast(`${opCode} unclassified`);
  };

  const finalResults = useMemo(() => results.map(r => {
    if (!(r.opCode in overrides)) return r;
    const ov = overrides[r.opCode];
    if (ov === '__EXCLUDE__') return { ...r, category: null, decision: 'EXCLUDE', confidence: 'EXCLUDED', reason: 'Manual override: excluded.', userMapped: true };
    if (ov === null) return { ...r, category: null, decision: 'REVIEW', confidence: 'LOW', reason: 'Manual override: unclassified.', userMapped: true };
    return { ...r, category: ov, decision: 'AUTO', confidence: 'HIGH', reason: `Manual override: assigned to ${ov}. Added to KB for future dealers.`, userMapped: true };
  }), [results, overrides]);

  const buckets = useMemo(() => ({
    // Mapped tab reflects CURRENT state (includes auto-mapped + user overrides)
    mapped: finalResults.filter(r => r.decision === 'AUTO'),
    // Review tab stays stable — items don't disappear when you map them, so you can
    // see your progress through the queue.
    review: finalResults.filter(r => r.originalDecision === 'REVIEW'),
    // Excluded tab: items originally excluded, even if user later overrides to a category
    excluded: finalResults.filter(r => r.originalDecision === 'EXCLUDE'),
    all: finalResults,
  }), [finalResults]);

  const stats = useMemo(() => {
    const totalRows = finalResults.reduce((a, r) => a + r.rowCount, 0);
    const mappedRows = buckets.mapped.reduce((a, r) => a + r.rowCount, 0);
    const reviewHandled = buckets.review.filter(r => r.userMapped).length;
    return {
      totalCodes: finalResults.length,
      mappedCodes: buckets.mapped.length,
      reviewCodes: buckets.review.length,
      reviewHandled,
      excludedCodes: buckets.excluded.length,
      coveragePct: totalRows > 0 ? Math.round(mappedRows / totalRows * 100) : 0,
    };
  }, [finalResults, buckets]);

  const kbStats = useMemo(() => ({
    total: kb.length,
    seed: kb.filter(e => e.source === 'seed').length,
    learned: kb.filter(e => e.source !== 'seed').length,
  }), [kb]);

  const importKb = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw new Error('Not an array');
        const valid = data.filter(d => d.opCode && d.description && d.category);
        setKb(valid);
        showToast(`Loaded ${valid.length} KB entries`);
        // re-run classification if we already have results
        if (results.length > 0 && cols) {
          const aggregated = aggregateByOpCode(rows, cols);
          setResults(aggregated.map(a => classifyOpCode(a, valid)));
        }
      } catch (err) {
        setError('Invalid KB file: ' + err.message);
      }
    };
    reader.readAsText(file);
  };

  const reset = () => {
    setStep('upload'); setRows([]); setHeaders([]); setCols(null);
    setResults([]); setOverrides({}); setError(null);
  };

  return (
    <div className="app">
      <Header dealerName={dealer} />

      {error && (
        <div style={{ padding: 14, background: 'var(--danger-soft)', color: 'var(--danger)', marginBottom: 20, fontSize: 13, borderRadius: 2 }}>
          {error}
        </div>
      )}

      {step === 'upload' && (
        <>
          <UploadPanel onFile={handleFile} />
          <div className="toolbar" style={{ marginTop: 20 }}>
            <span className="label">Knowledge Base</span>
            <span className="kb-badge"><strong>{kbStats.total}</strong> entries · {kbStats.seed} seed · {kbStats.learned} learned</span>
            <button className="btn sm" onClick={() => kbImportRef.current?.click()}>Import KB</button>
            <input ref={kbImportRef} type="file" accept=".json" style={{ display: 'none' }}
              onChange={(e) => e.target.files[0] && importKb(e.target.files[0])} />
            <button className="btn sm" onClick={() => setPreview({
              title: 'Knowledge Base JSON',
              filename: `ez_wins_opcode_kb_${new Date().toISOString().slice(0, 10)}.json`,
              content: buildKbJson(kb),
              contentType: 'application/json',
            })}>Export KB</button>
          </div>
        </>
      )}

      {step === 'map' && (
        <>
          <div className="dealer-field">
            <label>Dealer name</label>
            <input value={dealer} onChange={(e) => setDealer(e.target.value)} placeholder="e.g. DeMontrond GMC Buick" />
          </div>
          <ColumnMapper headers={headers} detected={detectedCols} onConfirm={runClassifier} onCancel={reset} />
        </>
      )}

      {step === 'results' && (
        <>
          <div className="results-header">
            <div>
              <h2>Classification complete</h2>
              <div className="sub">{rows.length.toLocaleString()} rows · {results.length} unique op codes · classified against {kbStats.total} KB entries</div>
            </div>
            <div><button className="btn ghost" onClick={reset}>← Start over</button></div>
          </div>

          <div className="stats-grid">
            <div className="stat"><div className="label">Auto-mapped</div><div className="value">{stats.mappedCodes}</div><div className="sub">op codes ready to set up</div></div>
            <div className="stat"><div className="label">Review queue</div><div className="value">{stats.reviewCodes}</div><div className="sub">{stats.reviewHandled > 0 ? `${stats.reviewHandled} handled` : 'need human confirmation'}</div></div>
            <div className="stat"><div className="label">Excluded</div><div className="value">{stats.excludedCodes}</div><div className="sub">oil, MPI, recall, wash, etc.</div></div>
            <div className="stat"><div className="label">Coverage</div><div className="value">{stats.coveragePct}%</div><div className="sub">of total RO lines classified</div></div>
          </div>

          <div className="dealer-field">
            <label>Dealer name</label>
            <input value={dealer} onChange={(e) => setDealer(e.target.value)} placeholder="Dealer name for exports" />
          </div>

          <div className="toolbar">
            <span className="label">Exports</span>
            <span className="kb-badge">KB: <strong>{kbStats.total}</strong> entries</span>
            <button className="btn sm" onClick={() => setPreview({
              title: 'Mapping CSV',
              filename: safeFilename(dealer, 'opcode_mapping.csv'),
              content: buildMappingCsv(finalResults),
              contentType: 'text/csv',
            })}>Mapping CSV</button>
            <button className="btn sm" onClick={() => setPreview({
              title: 'Review CSV',
              filename: safeFilename(dealer, 'opcode_review.csv'),
              content: buildReviewCsv(finalResults),
              contentType: 'text/csv',
            })}>Review CSV</button>
            <button className="btn sm" onClick={() => setPreview({
              title: 'Knowledge Base JSON',
              filename: `ez_wins_opcode_kb_${new Date().toISOString().slice(0, 10)}.json`,
              content: buildKbJson(kb),
              contentType: 'application/json',
            })}>Export KB</button>
            <button className="btn primary sm" onClick={() => safeExport(() => generatePdf(finalResults, dealer, kbStats), 'Client PDF', showToast)}>Client PDF</button>
          </div>

          <div className="tabs">
            <button className={'tab' + (tab === 'mapped' ? ' active' : '')} onClick={() => setTab('mapped')}>Auto-mapped<span className="count">{buckets.mapped.length}</span></button>
            <button className={'tab' + (tab === 'review' ? ' active' : '')} onClick={() => setTab('review')}>Review queue<span className="count">{buckets.review.length}</span></button>
            <button className={'tab' + (tab === 'excluded' ? ' active' : '')} onClick={() => setTab('excluded')}>Excluded<span className="count">{buckets.excluded.length}</span></button>
            <button className={'tab' + (tab === 'all' ? ' active' : '')} onClick={() => setTab('all')}>All<span className="count">{buckets.all.length}</span></button>
          </div>

          <OpCodeList
            results={buckets[tab]}
            onOverride={applyOverride}
            emptyMsg={tab === 'mapped' ? 'No auto-mapped op codes yet.' : tab === 'review' ? 'Nothing to review.' : tab === 'excluded' ? 'No excluded codes.' : 'No data.'}
            showProgress={tab === 'review'}
          />
        </>
      )}

      {toast && <div className="toast">{toast}</div>}
      {preview && <PreviewModal {...preview} onClose={() => setPreview(null)} showToast={showToast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
